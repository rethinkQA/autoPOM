# Publish to npm — triggered by version tags (v*)
#
# Builds the framework package and publishes to npm with provenance.
# Requires NPM_TOKEN secret to be set in the repository.

name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # Required for npm provenance

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Validate NPM_TOKEN is configured
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Configure it in the 'npm' environment."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build framework
        run: cd framework && npm run build

      - name: TypeScript type-check (full)
        run: cd framework && npx tsc --noEmit -p tsconfig.check.json

      - name: Install Playwright browsers
        run: cd framework && npx playwright install --with-deps

      - name: Run unit tests
        run: cd framework && npx playwright test --config=playwright.unit.config.ts

      - name: Run integration tests
        run: |
          npm run install:all
          npm run generate-shared
          cd framework && npx playwright test

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./framework/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Verify package contents
        run: cd framework && npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt

      - name: Publish to npm
        run: cd framework && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
